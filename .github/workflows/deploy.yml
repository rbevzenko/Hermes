name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'index.html'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit built files to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Copy built files to repo root
          cp -r dist/assets ./assets
          cp dist/index.html ./index.html
          # Copy public files (icons, etc)
          cp dist/*.svg . 2>/dev/null || true
          cp dist/*.png . 2>/dev/null || true
          cp dist/*.webmanifest . 2>/dev/null || true
          git add index.html assets/ *.svg *.png *.webmanifest 2>/dev/null || git add index.html assets/
          git diff --staged --quiet || git commit -m "build: update static site [skip ci]"
          git push origin main
