name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm run build

      - name: Commit built files to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          cp -r dist/assets ./assets
          cp dist/index.html ./index.html
          cp dist/*.svg dist/*.png dist/*.ico dist/*.webmanifest . 2>/dev/null || true
          git add index.html assets/
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "build: update static site [skip ci]" && git push origin HEAD:main)
