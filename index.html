<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/Hermes/omega.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Λεξιλόγιο — Греческий словарь</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/Hermes/assets/app.CiNSg3W4.js"></script>
    <link rel="stylesheet" crossorigin href="/Hermes/assets/style.ClE8vwr6.css">
  <link rel="manifest" href="/Hermes/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/Hermes/registerSW.js"></script></head>
  <body>
    <div id="root"></div>
    <div id="js-error-fallback" style="display:none;font-family:monospace;padding:24px;background:#F5ECD7;color:#1A1208;max-width:700px;margin:40px auto;border-radius:8px;border:2px solid #C4522A;">
      <b style="color:#C4522A">JavaScript error:</b>
      <pre id="js-error-msg" style="margin-top:8px;white-space:pre-wrap;word-break:break-word"></pre>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('js-error-fallback').style.display = 'block';
        document.getElementById('js-error-msg').textContent = (e.message || '') + '\n' + (e.filename || '') + ':' + e.lineno;
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('js-error-fallback').style.display = 'block';
        document.getElementById('js-error-msg').textContent = String(e.reason);
      });
    </script>
  </body>
</html>
